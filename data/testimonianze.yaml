- testo: "Io, una viaggiatrice per il mondo, ho vissuto a Londra e ora in Australia. A seguito di un incidente stradale avevo paura dell’auto e questo impediva la mia libertà. Ora guido e amo anche le brevi distanze. Grazie."
  firma: "S.G."

- testo: "Ero sempre trafelata e di corsa. Inoltre la tiroide aveva iniziato a dare segni di cedimento. Ho imparato a prendermi il tempo grazie a un percorso con la dottoressa ed è incredibile: i valori sono rientrati."
  firma: "D.C."

- testo: "Dall’età di 12 anni giravo con il Ventolin, asma e crisi respiratorie erano il mio pane quotidiano. Dopo un percorso con l’albero genealogico oggi a 40 anni finalmente sono libera."
  firma: "Una farmacista che respira"

- testo: "Amore e odio verso la madre impedivano la mia piena realizzazione e creavano un fastidioso sintomo fisico. Dopo il lavoro dell’albero genealogico quel problema è sparito insieme a un ritrovato rapporto sereno con la mamma."
  firma: "G.F."

- testo: "La schiena si faceva dolorosamente sentire ogni volta che le relazioni intorno diventavano dolorose, un percorso intenso, ma gioioso mi ha restituito la pace in famiglia. Strano ma anche la schiena ringrazia!"
  firma: "D.S."

- testo: "Sono rimasta scioccata quando ho notato che la mia vita era la replica di quella delle mie nonne! Ripetevo i loro traumi senza avvedermene e alla stessa età! Mi andava tutto storto! Ora non più! Mi sento liberata!"
  firma: "C.B."  

- testo: "La dermatite alle mani con cui lottavo da anni, mi impediva di fare il lavoro che amavo: la cioccolatiera. Eliminato lo stress, eliminato il problema, grazie"
  firma: "C.L." 

- testo: "Non riuscivo ad afferrare le mie passioni, il tempo era tiranno e il lavoro soffocante di impegni e ritmi serrati per poche briciole. Ora ho imparato a dire di no e la vita mi dona quel valore e quella serenità che erano solo un lontano retaggio, grazie"
  firma: "M.S." 