{{ define "main" }}

<section class="book-single">

  <div class="book-single-inner">

    <!-- COPERTINA -->
    <div class="book-cover">
      <img src="{{ .Params.cover }}" alt="{{ .Title }}">
    </div>

    <!-- CONTENUTO -->
    <div class="book-content">

      <h1>{{ .Title }}</h1>

      {{ with .Params.subtitle }}
      <p class="book-subtitle">{{ . }}</p>
      {{ end }}

      <div class="book-text">
        {{ .Content }}
      </div>

      <a href="#" class="btn">Acquista il libro</a>

    </div>

  </div>

</section>

{{ end }}
