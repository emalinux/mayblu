{{ define "main" }}

<section class="book-page vetrina">
  <div class="book-card book-single-card">

    <div class="book-hero">

      <div class="book-cover">
        <img src="{{ .Params.cover }}" alt="{{ .Title }}" />
      </div>

      <div class="book-content">

        <h1>{{ .Title }}</h1>

        {{ with .Params.subtitle }}
        <p class="book-subtitle">{{ . }}</p>
        {{ end }}

        {{ with .Params.excerpt }}
        <p class="book-description">{{ . }}</p>
        {{ end }}

        <div class="book-links">
          <a href="{{ .Params.pdf }}" target="_blank" class="link-ghost">
            📖 Leggi estratto
          </a>

          <a href="{{ .Params.pdf }}" download class="link-ghost">
            ⬇️ Scarica PDF
          </a>
        </div>

        <a href="/contatti" class="btn-primary">
          Richiedi informazioni
        </a>

      </div>
    </div>

  </div>
</section>

{{ end }}
